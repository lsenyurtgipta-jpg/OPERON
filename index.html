<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">
    <title>OPERON - İnşaat Yönetim Sistemi</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html { height: 100vh; width: 100vw; overflow: hidden; margin: 0; padding: 0; }
      body { width: 100vw; height: 100vh; overflow: hidden; margin: 0; padding: 0; }
      #root { width: 100%; height: 100%; overflow: hidden; margin: 0; padding: 0; }
      /* Masaüstünde (fare + geniş ekran) %90 zoom ile ekrana daha çok içerik sığar.
         iPad/tablet gibi dokunmatik cihazlarda devre dışı: orada `zoom` düzgün
         çalışmadığı için gövde ekrandan ~%11 taşıp sağ kenarı (Ekle/Excel butonları,
         tablo kolonları) kesiliyordu. Dokunmatikte gövde tam ekrana oturur. */
      @media (min-width: 1280px) and (hover: hover) and (pointer: fine) {
        body { width: calc(100vw / 0.9); height: calc(100vh / 0.9); zoom: 0.9; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
